document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

gradient(circle,#ffe179 0%,#ffc94d 52%,rgba(255,201,77,0) 72%);\"><\u002Fdiv>\n    <div style=\"position:absolute; top:26px; left:360px; font-size:32px; opacity:.5;\">🌴<\u002Fdiv>\n    <div style=\"position:absolute; bottom:70px; left:16px; font-size:28px; opacity:.45;\">🐚<\u002Fdiv>\n    <div style=\"position:absolute; bottom:96px; right:26px; font-size:26px; opacity:.4;\">🍍<\u002Fdiv>\n\n    <!-- header -->\n    <div style=\"position:relative; display:flex; align-items:center; justify-content:space-between; padding:20px 38px 6px;\">\n      <img src=\"dd5a25bd-262d-4010-90db-a99433bb2e47\" style=\"height: 52px; display: block\">\n      <div style=\"text-align:center; line-height:1;\">\n        <div style=\"font-family:Pacifico; font-size:38px; color:#ff6b5c; text-shadow:0 2px 0 #fff;\">Summer Reset<\u002Fdiv>\n        <div style=\"font-family:'Baloo 2'; font-weight:800; font-size:22px; letter-spacing:8px; color:#0f2942; margin-top:4px;\">SPIRIT WEEKS<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"text-align:right; background:#0f2942; border-radius:14px; padding:9px 15px;\">\n        <div style=\"font:800 12px Poppins; letter-spacing:1.5px; color:#7fe0ef;\">JUNE 29 – JULY 10<\u002Fdiv>\n        <div style=\"font:600 12px Poppins; color:#dfe9f2; margin-top:2px;\">2026 · Mon–Thu<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- grid -->\n    <div style=\"position:relative; flex:1; display:flex; align-items:center; padding:2px 38px;\">\n      <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:54px 40px; width:100%; padding:10px 12px;\">\n        <sc-for list=\"{{ days }}\" as=\"d\" hint-placeholder-count=\"8\">\n          <div style=\"{{ d.cardWrap }}\">\n          <div style=\"{{ d.card }}\">\n            <div style=\"{{ d.tape }}\"><\u002Fdiv>\n            <div style=\"{{ d.watermark }}\">{{ d.icon }}<\u002Fdiv>\n            <sc-if value=\"{{ d.isActive }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"position:absolute; top:10px; right:10px; background:#fff; color:#0f2942; font:800 11px Poppins; letter-spacing:1.5px; padding:6px 13px; border-radius:999px; z-index:6; box-shadow:0 6px 16px rgba(0,0,0,.28); animation:srBadge 1.8s ease-in-out infinite; transform-origin:center;\">★ TODAY<\u002Fdiv>\n            <\u002Fsc-if>\n            <div style=\"position:relative; z-index:1; display:flex; flex-direction:column; height:100%;\">\n              <div style=\"display:inline-flex; align-self:flex-start; background:#fff; border-radius:999px; padding:4px 12px; align-items:baseline; gap:7px; box-shadow:0 3px 8px rgba(15,41,66,.16);\">\n                <span style=\"font:700 9.5px Poppins; letter-spacing:1.5px; color:#9aa9b8;\">{{ d.dow }}<\u002Fspan>\n                <span style=\"font-family:'Baloo 2'; font-weight:800; font-size:15px; color:#16314a;\">{{ d.dateLabel }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"margin-top:11px;\">\n                <div style=\"font:800 9px Poppins; letter-spacing:2px; color:rgba(255,255,255,.72);\">ACTIVITY<\u002Fdiv>\n                <div style=\"{{ d.activityStyle }}\">{{ d.activity }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"margin-top:auto; background:rgba(255,255,255,.17); border:1px solid rgba(255,255,255,.22); border-radius:13px; padding:9px 11px;\">\n                <div style=\"font:800 8px Poppins; letter-spacing:2px; color:rgba(255,255,255,.78);\">THEME<\u002Fdiv>\n                <div style=\"font-family:'Baloo 2'; font-weight:800; font-size:14.5px; color:#fff; line-height:1.08; margin-top:2px;\">{{ d.theme }}<\u002Fdiv>\n                <div style=\"font:500 10.5px Poppins; color:rgba(255,255,255,.9); line-height:1.25; margin-top:2px;\">{{ d.sub }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"background:#0f2942; color:#fff; text-align:center; padding:11px; font:700 14px Poppins; letter-spacing:.4px;\">☀️ Recharge · Reconnect · Reset — wear your spirit every day! 🌊<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;activeDay&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;live&quot;,&quot;2026-06-29&quot;,&quot;2026-06-30&quot;,&quot;2026-07-01&quot;,&quot;2026-07-02&quot;,&quot;2026-07-06&quot;,&quot;2026-07-07&quot;,&quot;2026-07-08&quot;,&quot;2026-07-09&quot;],&quot;default&quot;:&quot;live&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    this._fit = () => {\n      const stage = document.getElementById('srStage');\n      if (!stage) return;\n      const s = Math.min(window.innerWidth / 1280, window.innerHeight / 720);\n      stage.style.transform = `translate(-50%,-50%) scale(${s})`;\n    };\n    this._fit();\n    this._raf = requestAnimationFrame(this._fit);\n    window.addEventListener('resize', this._fit);\n    // Auto-roll the \"today\" highlight over at midnight without needing a reload.\n    this._lastDay = new Date().toDateString();\n    this._dayCheck = setInterval(() => {\n      const now = new Date().toDateString();\n      if (now !== this._lastDay) {\n        this._lastDay = now;\n        this.forceUpdate();\n      }\n    }, 60 * 1000);\n  }\n  componentWillUnmount() {\n    window.removeEventListener('resize', this._fit);\n    if (this._raf) cancelAnimationFrame(this._raf);\n    if (this._dayCheck) clearInterval(this._dayCheck);\n  }\n\n  renderVals() {\n    const DATA = [\n      { dow:'MON', d:'29', mon:'JUN', iso:'2026-06-29', activity:'Reminders on Summer Reset', theme:'Rock the Reset', sub:'Show off your favorite bands', icon:'🎸', dark:'#e0493b' },\n      { dow:'TUE', d:'30', mon:'JUN', iso:'2026-06-30', activity:'Reset Walk', theme:'Throwback Tuesday', sub:'Tees with 90s/00s cartoons & memorabilia', icon:'📺', dark:'#0e8499' },\n      { dow:'WED', d:'1', mon:'JUL', iso:'2026-07-01', activity:'Ice Cream Social', theme:'World Sports Day', sub:\"Your favorite team's colors or jerseys\", icon:'🏅', dark:'#cf8200' },\n      { dow:'THU', d:'2', mon:'JUL', iso:'2026-07-02', activity:'Guided Meditation', theme:'Stars & Stripes', sub:'Wear red, white & blue', icon:'🎆', dark:'#1f5e8c' },\n      { dow:'MON', d:'6', mon:'JUL', iso:'2026-07-06', activity:'Summer Trivia', theme:'Superhero Day', sub:'Dress as your favorite superhero', icon:'🦸', dark:'#6b4bc4' },\n      { dow:'TUE', d:'7', mon:'JUL', iso:'2026-07-07', activity:'Reset Walk', theme:\"Steppin' in the Sunshine\", sub:'Wear bright neon colors', icon:'🌟', dark:'#1e9e55' },\n      { dow:'WED', d:'8', mon:'JUL', iso:'2026-07-08', activity:'Summer Reset Gathering at the Park', theme:'Sun & Shades Day', sub:'Hawaiian shirts, summer colors & shades', icon:'🕶️', dark:'#e26a1b' },\n      { dow:'THU', d:'9', mon:'JUL', iso:'2026-07-09', activity:'Guided Meditation & Survey', theme:'Zen & Done', sub:'Tie-dye & comfy clothing', icon:'🌈', dark:'#d23e7c' },\n    ];\n\n    const hexA = (hex, a) => {\n      const h = hex.replace('#','');\n      const r = parseInt(h.slice(0,2),16), g = parseInt(h.slice(2,4),16), b = parseInt(h.slice(4,6),16);\n      return `rgba(${r},${g},${b},${a})`;\n    };\n\n    const pad = (n) => String(n).padStart(2,'0');\n    const override = this.props.activeDay ?? 'live';\n    let todayIso;\n    if (override === 'live') {\n      const t = new Date();\n      todayIso = `${t.getFullYear()}-${pad(t.getMonth()+1)}-${pad(t.getDate())}`;\n    } else {\n      todayIso = override;\n    }\n    const todayTime = new Date(todayIso + 'T12:00:00').getTime();\n    const hasActive = DATA.some(it => it.iso === todayIso);\n\n    const ROT = [-2.2, 1.8, -1.6, 2.2, -1.8, 2.4, -2, 1.5];\n    const OFFY = [12, -7, 9, -4, -9, 7, -11, 4];\n    const TAPE = ['-7deg', '5deg', '6deg', '-5deg', '4deg', '-6deg', '-4deg', '6deg'];\n\n    const days = DATA.map((it, idx) => {\n      const itTime = new Date(it.iso + 'T12:00:00').getTime();\n      const isActive = it.iso === todayIso;\n      const isPast = itTime < todayTime && !isActive;\n      const rot = ROT[idx % ROT.length];\n      const offy = OFFY[idx % OFFY.length];\n      const cardWrap = {\n        position:'relative',\n        zIndex: isActive ? 50 : 1,\n        display:'flex', alignItems:'center', justifyContent:'center',\n      };\n      const card = {\n        position:'relative', background:it.dark, borderRadius:'18px 20px 19px 21px',\n        padding:'18px 15px 14px', height:'242px', width:'100%', overflow:'hidden',\n        boxShadow: isActive\n          ? `0 0 0 5px #fff, 0 0 0 10px ${hexA(it.dark,0.55)}, 0 18px 40px ${hexA(it.dark,0.5)}`\n          : '0 12px 26px rgba(15,41,66,0.2)',\n        transform: isActive\n          ? 'rotate(0deg) translateY(-14px) scale(1.09)'\n          : `rotate(${rot}deg) translateY(${offy}px)`,\n        animation: isActive ? 'srFloat 3.4s ease-in-out infinite' : 'none',\n        opacity: isPast ? 0.42 : 1,\n        filter: isPast ? 'saturate(0.7)' : 'none',\n        zIndex: isActive ? 5 : 1,\n        transition:'all .25s ease',\n      };\n      const watermark = { position:'absolute', right:'-16px', bottom:'-26px', fontSize:'120px', opacity:0.16, transform:'rotate(-8deg)', zIndex:0, lineHeight:1 };\n      const tape = {\n        position:'absolute', top:'-9px', left:'50%',\n        width:'74px', height:'24px',\n        transform:`translateX(-50%) rotate(${isActive ? '0deg' : TAPE[idx % TAPE.length]})`,\n        background:'rgba(255,255,255,0.45)',\n        borderLeft:'1px dashed rgba(255,255,255,0.55)', borderRight:'1px dashed rgba(255,255,255,0.55)',\n        boxShadow:'0 1px 3px rgba(0,0,0,0.12)', zIndex:4,\n      };\n      const activityStyle = { fontFamily:\"'Pacifico'\", fontWeight:400, fontSize:'21px', color:'#ffffff', lineHeight:1.25, marginTop:'4px', textShadow:'0 1px 1px rgba(0,0,0,.18)' };\n      return { ...it, isActive, isPast, dateLabel: it.mon + ' ' + it.d, cardWrap, card, watermark, tape, activityStyle };\n    });\n\n    return { days };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
